# Deploy static site to GitHub Pages (PHP does not run on Pages — counters use shared host URLs).
# Repo → Settings → Pages → Build: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r assets legacy _site/
          cp index.html _site/
          [ -f robots.txt ] && cp robots.txt _site/
          [ -f sitemap.xml ] && cp sitemap.xml _site/
          for f in google*.html; do [ -f "$f" ] && cp "$f" _site/; done || true
          # Never ship a CNAME in the artifact; custom host belongs in repo Settings only (and must be removed to drop it).
          rm -f _site/CNAME

      - name: Patch index for Pages + shared PHP API
        env:
          GHPAGES_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          STX_SHARED_API_BASE: https://save-editor.be/Scooters_TBX
        run: node scripts/patch-index-for-github-pages.mjs _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
